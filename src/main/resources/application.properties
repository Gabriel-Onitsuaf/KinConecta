spring.application.name=KCv2
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=jdbc:mysql://${PROD_DB_HOST:localhost:3306}/${PROD_DB_NAME:kin_conecta}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${PROD_DB_USERNAME:root}
spring.datasource.password=${PROD_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

security.jwt.secret=${JWT_SECRET:change-me-in-production-change-me-in-production}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:3000}
